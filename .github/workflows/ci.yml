name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@10.18.2 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quality checks
        run: pnpm check

      - name: Build
        run: pnpm build
        env:
          INTERNAL_API_BASE_URL: http://127.0.0.1:7001
          NEXT_PUBLIC_API_BASE_PATH: /api
          NEXT_PUBLIC_ASSET_ORIGIN:
          NEXT_PUBLIC_ENABLE_FIGMA_ROUTE: true
