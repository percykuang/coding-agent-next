name: coding-agent-next

services:
  server:
    image: ${IMAGE_NAMESPACE}/coding-agent-next-server:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: 7001
      CORS_ORIGIN: ${CORS_ORIGIN:-https://coding.percy.ren}
      ENABLE_FIGMA_ROUTE: ${ENABLE_FIGMA_ROUTE:-false}
    volumes:
      - uploads_data:/app/storage/uploads
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:7001/healthz').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ${IMAGE_NAMESPACE}/coding-agent-next-web:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_API_BASE_PATH: ${NEXT_PUBLIC_API_BASE_PATH:-/api}
      NEXT_PUBLIC_ASSET_ORIGIN: ${NEXT_PUBLIC_ASSET_ORIGIN:-}
      NEXT_PUBLIC_ENABLE_FIGMA_ROUTE: ${NEXT_PUBLIC_ENABLE_FIGMA_ROUTE:-false}
    networks:
      default: {}
      edge:
        aliases:
          - coding-agent-web

networks:
  edge:
    external: true
    name: ${EDGE_NETWORK:-edge}

volumes:
  uploads_data:
